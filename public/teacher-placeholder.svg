<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F0EF"/>
      <stop offset="50%" stop-color="#E8E8E6"/>
      <stop offset="100%" stop-color="#DEDEDB"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B6FF00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#B6FF00" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <circle cx="320" cy="80" r="60" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="80" cy="420" r="40" fill="url(#accent)" opacity="0.5"/>
  <!-- Silhouette -->
  <ellipse cx="200" cy="160" rx="70" ry="80" fill="#C8C8C5"/>
  <path d="M80 500 C80 380 130 320 200 320 C270 320 320 380 320 500 Z" fill="#C8C8C5"/>
  <!-- Math symbols -->
  <text x="60" y="100" font-family="Georgia, serif" font-size="28" fill="#B6FF00" opacity="0.6">+</text>
  <text x="300" y="200" font-family="Georgia, serif" font-size="24" fill="#B6FF00" opacity="0.4">Ą</text>
  <text x="50" y="300" font-family="Georgia, serif" font-size="22" fill="#111111" opacity="0.15">x²</text>
  <text x="310" y="380" font-family="Georgia, serif" font-size="20" fill="#111111" opacity="0.12"></text>
  <text x="170" y="460" font-family="system-ui, sans-serif" font-size="11" fill="#6B6B6B" text-anchor="middle" letter-spacing="2">$"  "/</text>
</svg>
